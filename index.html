<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Centered Image</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: left;
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .image-section {
      text-align: center;
    }

    img {
      max-width: 800px;
      max-height: 600px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button {
      margin-top: 20px;
      padding: 15px 160px;
      font-size: 20px;
      border: none;
      border-radius: 5px;
      background-color: #007BFF;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .text {
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="image-section">
      <img src="passport-photo-portrait-young-man-white-background_1028938-330516-770429039.jpg" alt="Centered Image">
      <br>
      <button>Next</button>
    </div>

    <div class="text">
      Example text
    </div>

  </div>

</body>
</html>
