<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WestViewer</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #ffffff;
      font-family: 'Montserrat', sans-serif;
    }

    /* Top-left text */
    .text {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 32px;
      font-weight: bold;
    }

    /* Center everything */
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    img {
      width: 400px;
      max-width: 90vw;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      
      outline: 6px solid black;   /* black outline */
      outline-offset: 0;           /* sits flush with image */
    }
    button {
      font-family: inherit; /* uses Montserrat */
      margin-top: 15px;
      padding: 10px 155px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background-color: #C10A0A;
      color: white;
      cursor: pointer;
      
    outline: 2px solid black;
  outline-offset: 0;

  transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
    background-color: #650304;
  /
  transform: scale(1.05);          
  box-shadow: 0 0 0 4px #C10A0A;
    }
input[type="range"] {
  -webkit-appearance: none;  
  margin-top: 20px;
  width: 320px;
  height: 14px;
  border-radius: 7px;
  background: #C10A0A;     
  outline: 2px solid black;   
  outline-offset: 0;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: white;
  border: 2px solid black;
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
}

/* Hover effect on thumb */
input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
  background: #ffcccc; 
}

/* Active while dragging */
input[type="range"]::-webkit-slider-thumb:active {
  transform: scale(1.3);
  background: #ffffff;
}
  </style>
</head>
<body>

  <div class="text">
    WestViewer
  </div>
  <p id=""></p>
  <div class="center">
   <img id="myImage" src="1.jpg">
    <button onclick="generateNumber()">Smash</button>
    <button onclick="generateNumber()">Pass</button>
    <input type="range" id="slider" min="1" max="2" value="1">
    <p id="valueDisplay">F</p>
  </div>
 
 <script>
let GenderFilter = "F";

const slider = document.getElementById("slider");
const display = document.getElementById("valueDisplay");

// Slider logic
slider.oninput = function () {
  if (this.value == 1) {
    display.textContent = "F";
    GenderFilter = "F";
  } else {
    display.textContent = "M";
    GenderFilter = "M";
  }
};

// Main function

function generateNumber() {
  let randomNumber;

  if (GenderFilter === "F") {
    // 1–60
    randomNumber = Math.floor(Math.random() * 60) + 1;
  } else {
    // 60–95
    randomNumber = Math.floor(Math.random() * 34) + 61;
  }

  let imagePath = randomNumber + ".jpg";
  document.getElementById("myImage").src = imagePath;
  document.getElementById("output").textContent = imagePath;
  
    const slider = document.getElementById("slider");

slider.oninput = function () {
  const value = parseInt(this.value);
  const display = document.getElementById("valueDisplay");

  if (value === 1) {
    display.textContent = "F";
    this.style.background = "#888888";
  } else {
    display.textContent = "M";
    this.style.background = "#C10A0A"; 
  }
};
</script>
  
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
  
</body>
  </html>
