<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Layout</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    /* Top-left text */
    .text {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 32px;
      font-weight: bold;
    }

    /* Center everything */
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    img {
      width: 500px;
      max-width: 90vw;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background-color: #007BFF;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="text">
    FaceView
  </div>

  <div class="center">
    <img src="passport-photo-portrait-young-man-white-background_1028938-330516-770429039.jpg" alt="Centered Image">
    <button onclick="generateNumber()">Next Faculty Member</button>
  </div>

      <h1>Random Numeber:</h1>
  <p id="output">Click the button</p>

<button onclick="generateNumber()">Generate</button>
  
  <script>
    function generateNumber() {
  let randomNumber = Math.floor(Math.random() * 10) + 1;
  document.getElementById("output").textContent = randomNumber;
      }
  </script>

  
</body>
</html
