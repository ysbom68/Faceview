<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WestViewer</title>
  <img src="Westviewer.png" class="top-left-image">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #ffffff;
      font-family: 'Montserrat', sans-serif;
    }

    /* Top-left text */
    .text {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 32px;
      font-weight: bold;
    }

    /* Center everything */
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    img {
      width: 400px;
      max-width: 90vw;
      height: auto;
      border: 6px solid black;
      border-radius: 10px;
    }
    .top-left-image {
    position: fixed;
    top: 15px;     /* distance from top */
    left: 15px;   /* distance from right */
    width: 220px;  /* adjust size */
    height: auto;
    z-index: 1000; /* keeps it above other elements */
      
    box-shadow: none;
    filter: none;
    }

    button {
      font-family: inherit; /* uses Montserrat */
      margin-top: 15px;
      padding: 10px 155px;
      font-size: 16px;
      border: 6px solid black;
      border-radius: 6px;
      background-color: #C10A0A;
      color: white;
      cursor: pointer;
      transition: background-color 0.2s ease, 
      transform 0.1s ease,
      border-width 0.1s ease;
    }
    /* Hover = darker */
button:hover {
  background-color: #650304;
  }

/* Click animation */
button:active {
  transform: scale(0.95);   /* slight shrink */
  background-color: #FF1A1A;    /* quick bright flash */
  border-width: 6px;            /* border thickens on click */
  filter: brightness(0.9);
  transition: all 0.15s ease;
}
  </style>

  <div class="text">
  
  </div>

  <p id=""></p>

  <div class="center">
    <img id="myImage" src="1.jpg">
    <button onclick="generateNumber()">Smash</button>
    <button onclick="generateNumber()">Pass</button>
    <input type="range" id="slider" min="1" max="2" value="1">
    <p id="valueDisplay">F</p>
  </div>

  <script>
    let GenderFilter = "F";
    const slider = document.getElementById("slider");
    const display = document.getElementById("valueDisplay");

    // Slider logic
    slider.oninput = function () {
      if (this.value == 1) {
        display.textContent = "F";
        GenderFilter = "F";
      } else {
        display.textContent = "M";
        GenderFilter = "M";
      }
    };

    // Main function
    function generateNumber() {
  let randomNumber;

  if (GenderFilter === "F") {
    // 1–50
    randomNumber = Math.floor(Math.random() * 60) + 1;
  } else {
    // 51–100
    randomNumber = Math.floor(Math.random() * 35) + 61;
  }

  let imagePath =randomNumber + ".jpg";
  document.getElementById("myImage").src = imagePath;
  document.getElementById("output").textContent = imagePath;
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

</body>
</html>
