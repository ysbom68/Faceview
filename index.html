<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Layout</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: ffffff;
      font-family: Arial, sans-serif;
    }

    /* Top-left text */
    .text {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 32px;
      font-weight: bold;
    }

    /* Center everything */
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    img {
      width: 500px;
      max-width: 90vw;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button {
      margin-top: 15px;
      padding: 10px 155px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background-color: #007BFF;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="text">
    FaceView
  </div>
  <p id="output">Click the button</p>
  <div class="center">
   <img id="myImage" src="1.jpg">
    <button onclick="generateNumber()">Next Faculty Member</button>
  </div>

     
 
<input type="range" id="slider" min="1" max="10" value="1">

<p>Rating: <span id="valueDisplay">1</span></p>
<button>Submit Rating</button>
    
  <script>
  document.getElementById("slider").oninput = function() {
    document.getElementById("valueDisplay").textContent = this.value;
  };
</script>

  <script>
    function generateNumber() {
      //random number 1-96
  let randomNumber = Math.floor(Math.random() * 96) + 1;
  document.getElementById("output").textContent = randomNumber;

    // build image filename
       let imagePath = randomNumber + ".jpg";

     // change image
  document.getElementById("myImage").src = imagePath; 
      }
  </script>
  

  
</body>
</html
